<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRVerse</title>

<style>

/* ================= BASE ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

/* ================= HEADER ================= */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin-bottom:25px;
    position:relative;
}

.header img{
    position:absolute;
    left:0;
    width:120px;
    height:70px;
    object-fit:contain;
    padding:6px;
    border-radius:14px;
    background:transparent;
    filter:drop-shadow(0 0 8px rgba(0,0,0,0.6));
}

.title{
    font-size:34px;
    font-weight:900;
    background:linear-gradient(135deg,#facc15,#ef4444);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= LAYOUT ================= */
.main{
    display:grid;
    grid-template-columns:1fr 420px;
    gap:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:25px;
}

/* ================= INPUT ================= */
textarea{
    width:100%;
    min-height:150px;
    border:none;
    outline:none;
    border-radius:15px;
    padding:15px;
    background:#334155;
    color:white;
}

/* ================= DETECT ================= */
.detect-badge{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    font-size:12px;
    font-weight:700;
    border-radius:999px;
    background:linear-gradient(135deg,#7c3aed,#06b6d4,#ec4899);
    color:white;
}

/* ================= ACTIONS ================= */
.actions{
    margin-top:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.action-btn{
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
    color:white;
    transition:0.2s;
    font-size:13px;
    min-width:90px;
}

.action-btn:hover{
    opacity:0.85;
    transform:scale(1.03);
}

/* ================= DESIGN ================= */
.design-row{
    display:flex;
    gap:12px;
    margin-top:20px;
}

.design-card{
    flex:1;
    padding:15px;
    border-radius:18px;
    background:linear-gradient(135deg,#7c3aed,#06b6d4,#ec4899);
    text-align:center;
}

/* ================= PREVIEW ================= */
.preview-box{
    width:280px;
    height:280px;
    margin:auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

.preview-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:12px;
}

/* ================= FIX 1: LIVE PREVIEW HEADING ================= */
.preview-header{
    text-align:center;
    margin-bottom:15px;
}

.preview-header h3{
    font-size:18px;
    font-weight:800;
    color:#e2e8f0;
}

/* ================= FIX 2: CENTER LABEL AT BOTTOM ================= */
.preview-label{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:6px 12px;
    font-size:12px;
    border-radius:8px;
    font-weight:600;
    color:white;
}

/* ================= URL ================= */
.url-box{
    margin-top:12px;
    background:#334155;
    padding:10px;
    border-radius:10px;
    font-size:12px;
    word-break:break-word;
}

/* ================= BUTTON ================= */
button{
    margin-top:12px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
    color:white;
    font-weight:700;
    cursor:pointer;
}

/* ================= DOWNLOAD ================= */
.download-section{
    margin-top:15px;
}

.download-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.download-buttons button{
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
    color:white;
    transition:0.2s;
}

.download-buttons button:hover{
    opacity:0.85;
    transform:scale(1.03);
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

<img src="{{ url_for('static', filename='logos/yr-logo.png') }}">

<div class="title">QRVerse</div>

</div>

<div class="container">

<div class="main">

<!-- LEFT -->
<div class="card">

<h3>Smart QR Generator</h3>

<textarea id="qr-input"
placeholder="Enter text / website / phone"
oninput="detectInput()"></textarea>

<div id="detected-type" class="detect-badge">—</div>

<div id="actions" class="actions"></div>

<!-- DESIGN -->
<div class="design-row">

<div class="design-card">
<label>QR Color</label><br>
<input type="color" id="fill-color" value="#000000">
</div>

<div class="design-card">
<label>Background</label><br>
<input type="color" id="back-color" value="#ffffff">
</div>

</div>

</div>

<!-- RIGHT -->
<div class="card">

<!-- FIXED LIVE PREVIEW HEADER -->
<div class="preview-header">
    <h3>Live Preview</h3>
</div>

<div class="preview-box">

<img id="qr-image"
src="{{ url_for('static', filename='preview/company-preview.png') }}">

<!-- FIXED LABEL POSITION -->
<div class="preview-label" id="preview-label">YR Website</div>

</div>

<button onclick="openURL()">Dynamic URL</button>

<div id="dynamic-url" class="url-box">—</div>

<!-- DOWNLOAD -->
<div class="download-section">

<h3>Download QR</h3>

<div class="download-buttons">

<button onclick="downloadQR('jpeg')">JPEG</button>
<button onclick="downloadQR('png')">PNG</button>
<button onclick="downloadQR('svg')">SVG</button>
<button onclick="downloadQR('pdf')">PDF</button>

</div>

</div>

</div>

</div>

<script>

let currentAction="text";
let latestURL="";

/* ================= DETECT ================= */
function detectInput(){

const input=document.getElementById("qr-input").value.trim();
const badge=document.getElementById("detected-type");

if(!input){
badge.innerText="—";
document.getElementById("actions").innerHTML="";
return;
}

let actions=["text"];
let type="Text";

if(/^[0-9+\s\-()]{7,15}$/.test(input)){
type="Phone";
actions=["call","sms","whatsapp"];
}
else if(input.includes("@")){
type="Email";
actions=["email"];
}
else if(input.includes(".")){
type="Website";
actions=["website"];
}

badge.innerText=type;

renderActions(actions);
currentAction=actions[0];

generateQR();

}

/* ================= ACTIONS ================= */
function renderActions(actions){

const div=document.getElementById("actions");
div.innerHTML="";

actions.forEach(a=>{

const btn=document.createElement("button");
btn.className="action-btn";
btn.innerText=a.toUpperCase();

btn.onclick=()=>{
currentAction=a;
generateQR();
};

div.appendChild(btn);

});

}

/* ================= QR GENERATION ================= */
async function generateQR(){

const input=document.getElementById("qr-input").value.trim();
if(!input) return;

const res=await fetch("/live-preview",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
qrdata:input,
action:currentAction,
fill_color:document.getElementById("fill-color").value,
back_color:document.getElementById("back-color").value
})
});

const data=await res.json();

document.getElementById("qr-image").src=data.qr_image+"?t="+Date.now();

document.getElementById("preview-label").style.display="none";

latestURL=data.dynamic_url;

document.getElementById("dynamic-url").innerText=latestURL;

}

/* ================= OPEN URL ================= */
function openURL(){

if(!latestURL){
alert("No URL generated");
return;
}

window.open(latestURL,"_blank");

}

/* ================= DOWNLOAD ================= */
function downloadQR(format="jpeg"){

const input=document.getElementById("qr-input").value.trim();

if(!input){
alert("Enter QR data first");
return;
}

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
qrdata:input,
action:currentAction,
format:format
})
})
.then(res=>res.blob())
.then(blob=>{

const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="qr." + format;

document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);

});

}

</script>

</body>
</html>
